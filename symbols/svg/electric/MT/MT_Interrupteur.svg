<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Cercle central -->
  <circle cx="100" cy="100" r="20" fill="none" stroke="red" stroke-width="6"></circle>

  <!-- L inversé position 45° -->
  <g transform="rotate(45 100 100)">
    <line x1="100" y1="100" x2="100" y2="40" stroke="red" stroke-width="6" stroke-linecap="round"></line>
    <line x1="100" y1="40" x2="130" y2="40" stroke="red" stroke-width="6" stroke-linecap="round"></line>
  </g>

  <!-- L inversé position 225° -->
  <g transform="rotate(225 100 100)">
    <line x1="100" y1="100" x2="100" y2="40" stroke="red" stroke-width="6" stroke-linecap="round"></line>
    <line x1="100" y1="40" x2="130" y2="40" stroke="red" stroke-width="6" stroke-linecap="round"></line>
  </g>

</svg>
